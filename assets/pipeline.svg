<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="900" height="200" fill="#0d1117" rx="12"/>

  <!-- Stage 1 -->
  <rect x="30" y="55" width="180" height="90" rx="10" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="2"/>
  <text x="120" y="90" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">YOLOv8</text>
  <text x="120" y="112" text-anchor="middle" fill="#c9d1d9" font-size="12">Vehicle detection</text>
  <text x="120" y="128" text-anchor="middle" fill="#8b949e" font-size="11">car · truck · bus · bike</text>

  <line x1="210" y1="100" x2="250" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="255" y="55" width="180" height="90" rx="10" fill="#a371f7" opacity="0.15" stroke="#a371f7" stroke-width="2"/>
  <text x="345" y="90" text-anchor="middle" fill="#d2a8ff" font-size="16" font-weight="bold">ByteTrack</text>
  <text x="345" y="112" text-anchor="middle" fill="#c9d1d9" font-size="12">Multi-object tracking</text>
  <text x="345" y="128" text-anchor="middle" fill="#8b949e" font-size="11">persistent IDs</text>

  <line x1="435" y1="100" x2="475" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="480" y="55" width="180" height="90" rx="10" fill="#d29922" opacity="0.15" stroke="#d29922" stroke-width="2"/>
  <text x="570" y="90" text-anchor="middle" fill="#e3b341" font-size="16" font-weight="bold">Homography</text>
  <text x="570" y="112" text-anchor="middle" fill="#c9d1d9" font-size="12">Pixels → meters</text>
  <text x="570" y="128" text-anchor="middle" fill="#8b949e" font-size="11">bird's-eye view</text>

  <line x1="660" y1="100" x2="700" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4 -->
  <rect x="705" y="55" width="165" height="90" rx="10" fill="#238636" opacity="0.2" stroke="#3fb950" stroke-width="2"/>
  <text x="787" y="90" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">Speed</text>
  <text x="787" y="112" text-anchor="middle" fill="#c9d1d9" font-size="12">Δdistance / Δtime</text>
  <text x="787" y="128" text-anchor="middle" fill="#8b949e" font-size="11">smoothed, km/h</text>

  <text x="450" y="30" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="bold">Vehicle Speed Detection Pipeline</text>
  <text x="450" y="178" text-anchor="middle" fill="#8b949e" font-size="11">video frame → detections → tracked IDs → world coordinates → per-vehicle speed overlay</text>
</svg>
